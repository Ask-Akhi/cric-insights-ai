[supervisord]
nodaemon=true
logfile=/var/log/supervisord.log
logfile_maxbytes=10MB
pidfile=/var/run/supervisord.pid
loglevel=info

[program:fastapi]
command=python -m uvicorn backend.src.main:app --host 0.0.0.0 --port 8001 --workers 2
directory=/app
autostart=true
autorestart=true
startretries=5
stderr_logfile=/var/log/fastapi.err.log
stdout_logfile=/var/log/fastapi.out.log
environment=PYTHONPATH="/app"

[program:streamlit]
command=python -m streamlit run backend/ui/app.py --server.port=8502 --server.address=0.0.0.0 --server.headless=true --server.enableCORS=false --server.enableXsrfProtection=false
directory=/app
autostart=true
autorestart=true
startretries=5
stderr_logfile=/var/log/streamlit.err.log
stdout_logfile=/var/log/streamlit.out.log
environment=PYTHONPATH="/app/backend"
